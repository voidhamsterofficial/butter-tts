name: Release

# Tagging is what ships a build:
#   npm version 0.2.0 --no-git-tag-version   (keep the versions in step, see below)
#   git tag v0.2.0 && git push origin v0.2.0
#
# The exe then appears on the Releases page a few minutes later.
on:
  push:
    tags:
      - "v*"
  # Lets you produce a build from the Actions tab without tagging, for a dry run.
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    permissions:
      # Needed to create the release and upload the exe to it.
      contents: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Compiling songbird and Tauri from scratch takes minutes; this makes repeat runs
      # cheap. Keyed on the lockfile, so a dependency change invalidates it properly.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # A tag that disagrees with the app's own version produces a release whose exe
      # reports a different number to the one on the download page. Catch it before the
      # long build rather than after it ships.
      - name: Check the tag matches the app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          app_version=$(node -p "require('./src-tauri/tauri.conf.json').version")

          if [ "$tag_version" != "$app_version" ]; then
            echo "::error::Tag v$tag_version does not match tauri.conf.json version $app_version."
            echo "Bump the version in src-tauri/tauri.conf.json and package.json, then retag."
            exit 1
          fi

          echo "Releasing version $app_version"

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
        env:
          CMAKE: cmake

      - name: Test
        working-directory: src-tauri
        run: cargo test --lib
        env:
          CMAKE: cmake

      - name: Type-check the frontend
        run: npm run check

      - name: Build
        run: npm run tauri build
        env:
          # songbird compiles libopus from C, which needs cmake. The runner has it on
          # PATH; setting it here stops src-tauri/.cargo/config.toml — which points at a
          # local Visual Studio install — from being used instead. Cargo's [env] only
          # applies when a variable is not already set.
          CMAKE: cmake

      - name: Publish the release
        uses: softprops/action-gh-release@v2
        # A workflow_dispatch run builds and checks, but has no tag to release against.
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: src-tauri/target/release/butter-tts.exe
          generate_release_notes: true
          body: |
            ## Butter TTS ${{ github.ref_name }}

            Download **butter-tts.exe** below and run it. There is no installer — the app
            is one file, and it keeps its settings and history next to itself.

            On first run, open **Settings**, add your OpenAI key and Discord bot token,
            pick your microphone, and press Save. The **Docs** page inside the app explains
            the rest.

            > Windows may warn that the app is unrecognised, because the exe is not code
            > signed. Choose *More info* then *Run anyway*.

      # Handy for a workflow_dispatch dry run: the exe is downloadable from the run itself.
      - name: Attach the exe to the run
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: butter-tts-exe
          path: src-tauri/target/release/butter-tts.exe
          if-no-files-found: error
