name: Release

# Tagging is what ships a build:
#   npm version 0.2.0 --no-git-tag-version   (keep the versions in step, see below)
#   git tag v0.2.0 && git push origin v0.2.0
#
# The binaries then appear on the Releases page a few minutes later.
on:
  push:
    tags:
      - "v*"
  # Lets you produce a build from the Actions tab without tagging, for a dry run.
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: butter-tts.exe
            asset: butter-tts.exe
          - os: macos-latest
            binary: butter-tts
            asset: butter-tts-macos

    runs-on: ${{ matrix.os }}

    permissions:
      # Needed to create the release and upload the binaries to it.
      contents: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Compiling songbird and Tauri from scratch takes minutes; this makes repeat runs
      # cheap. Keyed on the lockfile, so a dependency change invalidates it properly.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}

      - name: Install frontend dependencies
        run: npm ci

      # A tag that disagrees with the app's own version produces a release whose binary
      # reports a different number to the one on the download page. Catch it before the
      # long build rather than after it ships.
      - name: Check the tag matches the app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          app_version=$(node -p "require('./src-tauri/tauri.conf.json').version")

          if [ "$tag_version" != "$app_version" ]; then
            echo "::error::Tag v$tag_version does not match tauri.conf.json version $app_version."
            echo "Bump the version in src-tauri/tauri.conf.json and package.json, then retag."
            exit 1
          fi

          echo "Releasing version $app_version"

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
        env:
          CMAKE: cmake

      - name: Test
        working-directory: src-tauri
        run: cargo test --lib
        env:
          CMAKE: cmake

      - name: Type-check the frontend
        run: npm run check

      - name: Build
        run: npm run tauri build
        env:
          # songbird compiles libopus from C, which needs cmake. Both runner images
          # ship one on PATH, so this just makes sure it is what gets used.
          CMAKE: cmake

      # The mac binary needs its executable bit set explicitly before zipping — cargo
      # sets it, but it is worth pinning down rather than trusting it survives the trip
      # through actions/upload and back.
      - name: Zip the macOS binary
        if: runner.os == 'macOS'
        working-directory: src-tauri/target/release
        run: |
          chmod +x butter-tts
          zip butter-tts-macos.zip butter-tts

      - name: Publish the release
        uses: softprops/action-gh-release@v2
        # A workflow_dispatch run builds and checks, but has no tag to release against.
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            ${{ runner.os == 'Windows' && 'src-tauri/target/release/butter-tts.exe' || 'src-tauri/target/release/butter-tts-macos.zip' }}
          generate_release_notes: true
          body: |
            ## Butter TTS ${{ github.ref_name }}

            There is no installer — the app is one file, and it keeps its settings and
            history next to itself.

            - **Windows**: download **butter-tts.exe** below and run it. Windows may warn
              that it is unrecognised, because it is not code signed. Choose *More info*
              then *Run anyway*.
            - **macOS**: download **butter-tts-macos.zip**, unzip it, then right-click the
              `butter-tts` binary and choose *Open* (it is not notarised, so a plain
              double-click will be blocked by Gatekeeper the first time).

            On first run, open **Settings**, add your OpenAI key and Discord bot token,
            pick your microphone, and press Save. The **Docs** page inside the app explains
            the rest.

      # Handy for a workflow_dispatch dry run: the binary is downloadable from the run itself.
      - name: Attach the binary to the run
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: butter-tts-${{ matrix.os }}
          path: src-tauri/target/release/${{ matrix.binary }}
          if-no-files-found: error
