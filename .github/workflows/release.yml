name: Release

# Tagging is what ships a build:
#   npm version 0.4.0 --no-git-tag-version   (keep the versions in step, see below)
#   git tag v0.4.0 && git push origin v0.4.0
#
# The builds then appear on the Releases page a few minutes later.
on:
  push:
    tags:
      - "v*"
  # Lets you produce a build from the Actions tab without tagging, for a dry run.
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows ships two ways from the one build: a portable exe (no installer,
          # no bundling — bundle.active is false in tauri.conf.json) and an NSIS
          # installer for people who would rather it show up in Start menu / Add or
          # Remove Programs. --bundles nsis adds the installer without turning off the
          # portable exe, which still comes out of every build regardless of targets.
          - os: windows-latest
            bundle_args: --bundles nsis
            artifact_glob: |
              src-tauri/target/release/butter-tts.exe
              src-tauri/target/release/bundle/nsis/*.exe
          # macOS gets an installer only (a .dmg) — there is no portable macOS build.
          # A raw macOS binary has no Dock/Finder icon at all (that only renders for a
          # real .app), and app data on macOS belongs in Application Support rather
          # than next to the binary, so "portable" does not buy anything there the way
          # it does on Windows. See src-tauri/src/store/mod.rs.
          #
          # Built for universal-apple-darwin: one .dmg with both arm64 and x86_64 slices,
          # so the same download runs natively on Apple Silicon and Intel Macs. The
          # universal target lands the bundle under target/universal-apple-darwin/ rather
          # than target/release/, so the glob points there.
          - os: macos-latest
            bundle_args: --bundles dmg --target universal-apple-darwin
            artifact_glob: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    permissions:
      # Needed to create the release and upload the builds to it.
      contents: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # The universal .dmg is both arm64 and x86_64 fused together, so the build needs the
      # std library for each. The runner is Apple Silicon, so aarch64 is already present
      # and x86_64 is the one it is missing — add both to be explicit and future-proof.
      - name: Add macOS build targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      # Compiling songbird and Tauri from scratch takes minutes; this makes repeat runs
      # cheap. Keyed on the lockfile, so a dependency change invalidates it properly.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}

      - name: Install frontend dependencies
        run: npm ci

      # A tag that disagrees with the app's own version produces a release whose build
      # reports a different number to the one on the download page. Catch it before the
      # long build rather than after it ships.
      - name: Check the tag matches the app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          app_version=$(node -p "require('./src-tauri/tauri.conf.json').version")

          if [ "$tag_version" != "$app_version" ]; then
            echo "::error::Tag v$tag_version does not match tauri.conf.json version $app_version."
            echo "Bump the version in src-tauri/tauri.conf.json and package.json, then retag."
            exit 1
          fi

          echo "Releasing version $app_version"

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
        env:
          CMAKE: cmake

      - name: Test
        working-directory: src-tauri
        run: cargo test --lib
        env:
          CMAKE: cmake

      - name: Type-check the frontend
        run: npm run check

      - name: Build
        run: npm run tauri build -- ${{ matrix.bundle_args }}
        env:
          # songbird compiles libopus from C, which needs cmake. Both runner images
          # ship one on PATH, so this just makes sure it is what gets used.
          CMAKE: cmake

      - name: Publish the release
        uses: softprops/action-gh-release@v2
        # A workflow_dispatch run builds and checks, but has no tag to release against.
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ matrix.artifact_glob }}
          generate_release_notes: true
          body: |
            ## Butter TTS ${{ github.ref_name }}

            - **Windows**: **butter-tts.exe** is a single portable file — no installer,
              no admin rights, nothing to uninstall. Prefer an installer instead? Grab
              the **-setup.exe**. Windows may warn that it is unrecognised, because it
              is not code signed — choose *More info* then *Run anyway*.
            - **macOS**: the **.dmg** is universal — one download that runs natively on
              both Apple Silicon and Intel Macs. Open it and drag **Butter TTS** into
              Applications. It is not notarised (that needs a paid Apple Developer
              account), so macOS quarantines it on download. If the first launch says the
              app is *"damaged"* or from an *"unidentified developer"*, clear the download
              flag once from Terminal:
              `xattr -dr com.apple.quarantine /Applications/butter-tts.app`
              then open it normally. The app is not actually damaged — this only removes
              the quarantine macOS adds to anything downloaded that Apple has not signed.

            The first time it runs, it asks where to keep its settings and history (one
            encrypted database file) — the system's app data folder by default, or right
            next to the app if you want the whole thing to stay portable. On first run,
            open **Settings**, add your OpenAI key and Discord bot token, pick your
            microphone, and press Save. The **Docs** page inside the app explains the
            rest.

      # Handy for a workflow_dispatch dry run: the build is downloadable from the run itself.
      - name: Attach the build to the run
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: butter-tts-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
